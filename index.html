        const btnCamera = document.getElementById('btnCamera'); const cameraInput = document.getElementById('cameraInput'); const modalForm = document.getElementById('modalForm'); const imagemPreview = document.getElementById('imagemPreview'); const iaStatus = document.getElementById('iaStatus'); const nomeProduto = document.getElementById('nomeProduto');
        btnCamera.addEventListener('click', () => { cameraInput.click(); });
        document.getElementById('btnCancelar').addEventListener('click', () => { modalForm.style.display = 'none'; cameraInput.value = ''; imagemPreview.style.display = 'none'; });

        cameraInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                modalForm.style.display = 'flex';
                const arquivo = e.target.files[0]; const leitor = new FileReader();
                leitor.onload = function(evento) {
                    imagemPreview.src = evento.target.result; imagemPreview.style.display = 'block'; nomeProduto.value = '';
                    if (modeloIA) {
                        iaStatus.style.display = 'block'; iaStatus.innerText = '🤖 IA...';
                        imagemPreview.onload = () => {
                            modeloIA.classify(imagemPreview).then(previsoes => {
                                iaStatus.style.display = 'none';
                                const termoIngles = previsoes[0].className.split(',')[0].toLowerCase().trim();
                                if(idiomaAtual === 'en') { nomeProduto.value = termoIngles.charAt(0).toUpperCase() + termoIngles.slice(1); } 
                                else {
                                    const termoTraduzido = dicionarioIA[termoIngles];
                                    if (termoTraduzido) { nomeProduto.value = termoTraduzido; } 
                                    else { nomeProduto.value = termoIngles.charAt(0).toUpperCase() + termoIngles.slice(1); }
                                }
                            });
                        }
                    } else { iaStatus.style.display = 'block'; iaStatus.innerText = '⚠️ IA...'; }
                }
                leitor.readAsDataURL(arquivo);
            }
        });

        document.getElementById('btnSalvar').addEventListener('click', async () => {
            const nome = nomeProduto.value; const preco = document.getElementById('precoProduto').value; const categoria = document.getElementById('categoriaProduto').value;
            if(!nome || !preco) { alert(dicionarioIdiomas[idiomaAtual].alertaFaltaDados); return; }
            let centro = mapa.getCenter();
            try {
                await addDoc(collection(db, "precos"), { nome: nome, preco: parseFloat(preco), categoria: categoria, lat: centro.lat, lng: centro.lng, status: "pendente", votosPositivos: 0, data: new Date() });
                saldoUsuario += 2.00; document.getElementById('saldoDisplay').innerText = `R$ ${saldoUsuario.toFixed(2).replace('.', ',')}`;
                nomeProduto.value = ''; document.getElementById('precoProduto').value = ''; imagemPreview.style.display = 'none'; modalForm.style.display = 'none'; cameraInput.value = '';
                alert(dicionarioIdiomas[idiomaAtual].alertaSalvo);
            } catch (error) {}
        });

        let marcadoresAtivos = {}; 
        onSnapshot(collection(db, "precos"), (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const dados = change.doc.data();
                const idDocumento = change.doc.id;

                if (change.type === "modified" || change.type === "removed") { if (marcadoresAtivos[idDocumento]) mapa.removeLayer(marcadoresAtivos[idDocumento]); }

                if (change.type === "added" || change.type === "modified") {
                    let iconeAtual = iconeAmarelo;
                    if (dados.status === "aprovado") { iconeAtual = iconeVerde; } 
                    else if (dados.status === "abusivo") { iconeAtual = iconeVermelho; }

                    // Salva os dados originais para poder re-traduzir depois
                    dadosDosPinos[idDocumento] = dados;

                    let novoPino = L.marker([dados.lat, dados.lng], {icon: iconeAtual}).addTo(mapa);
                    
                    // Chama a função mágica de gerar HTML traduzido
                    novoPino.bindPopup(gerarHTMLDoPopup(idDocumento, dados));
                    
                    marcadoresAtivos[idDocumento] = novoPino;
                }
            });
        });

        window.votar = async function(idDocumento, novoStatus) {
            const docRef = doc(db, "precos", idDocumento);
            try { await updateDoc(docRef, { status: novoStatus }); } catch (error) {}
        };
    </script>
</body>
</html>
