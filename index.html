        const dicionarioIA = { "water bottle": "Garrafa de Água", "beer glass": "Copo de Cerveja", "coffee mug": "Caneca de Café", "espresso": "Café Expresso", "sunglasses": "Óculos de Sol", "cellular telephone": "Celular", "mouse": "Mouse", "laptop": "Notebook", "backpack": "Mochila", "umbrella": "Guarda-chuva", "pop bottle": "Garrafa de Refrigerante", "water jug": "Galão de Água", "cup": "Copo", "menu": "Cardápio", "street sign": "Placa de Rua", "dining table": "Mesa de Restaurante", "plate": "Prato de Comida", "ice lolly": "Picolé" };
        let modeloIA = null; mobilenet.load().then(model => { modeloIA = model; });

        let saldoUsuario = 15.00; const mapa = L.map('mapa', {zoomControl: false}).setView([-22.9121, -43.2302], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(mapa);
        let pinoUsuario = null; let camadaDePinos = L.layerGroup().addTo(mapa);
        let dadosAgrupados = {}; let marcadoresFisicosNoMapa = {};

        function buscarLocalizacao() { mapa.locate({ setView: true, maxZoom: 17, enableHighAccuracy: true, timeout: 10000 }); }
        buscarLocalizacao(); document.getElementById('btnMira').addEventListener('click', () => { buscarLocalizacao(); });
        mapa.on('locationfound', function(e) { if (pinoUsuario) { mapa.removeLayer(pinoUsuario); } pinoUsuario = L.marker(e.latlng).addTo(mapa).bindPopup("📍 Você está aqui!"); });

        var iconeAmarelo = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34] });
        var iconeVerde = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34] });
        var iconeVermelho = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34] });

        // --- LÓGICA DE BUSCA INTELIGENTE ---
        const btnAbrirBusca = document.getElementById('btnAbrirBusca'); const modalBusca = document.getElementById('modalBusca'); const inputBusca = document.getElementById('inputBusca'); const resultadosBusca = document.getElementById('resultadosBusca');
        btnAbrirBusca.addEventListener('click', () => { modalBusca.style.display = 'flex'; inputBusca.value = ''; resultadosBusca.innerHTML = ''; inputBusca.focus(); });
        document.getElementById('btnFecharBusca').addEventListener('click', () => { modalBusca.style.display = 'none'; });

        inputBusca.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase().trim(); resultadosBusca.innerHTML = ''; if(!termo) return;
            for (const nomeLocal in dadosAgrupados) {
                const dadosLugar = dadosAgrupados[nomeLocal]; const lugarMatch = nomeLocal.toLowerCase().includes(termo);
                const itensMatch = dadosLugar.itens.filter(i => i.nome.toLowerCase().includes(termo));

                if (lugarMatch || itensMatch.length > 0) {
                    const div = document.createElement('div'); div.className = 'resultado-item';
                    let textoSecundario = `${dadosLugar.itens.length} itens no cardápio`;
                    if(itensMatch.length > 0 && !lugarMatch) { textoSecundario = `Encontrado: ${itensMatch.map(i => i.nome).join(', ')}`; }
                    div.innerHTML = `<span style="font-weight:700; color:#004d40;">🏪 ${nomeLocal}</span><span style="font-size:12px;color:#666;">${textoSecundario}</span>`;
                    
                    div.onclick = () => {
                        modalBusca.style.display = 'none';
                        mapa.flyTo([dadosLugar.lat, dadosLugar.lng], 18, { duration: 1.5 });
                        setTimeout(() => { if(marcadoresFisicosNoMapa[nomeLocal]) { marcadoresFisicosNoMapa[nomeLocal].openPopup(); } }, 1500); 
                    };
                    resultadosBusca.appendChild(div);
                }
            }
        });

        // --- FORMULÁRIO E BANCO ---
        const btnCamera = document.getElementById('btnCamera'); const cameraInput = document.getElementById('cameraInput'); const modalForm = document.getElementById('modalForm'); const imagemPreview = document.getElementById('imagemPreview'); const iaStatus = document.getElementById('iaStatus'); const nomeProduto = document.getElementById('nomeProduto'); const selectLocal = document.getElementById('selectLocal'); const nomeLocalInput = document.getElementById('nomeLocalInput');
        
        selectLocal.addEventListener('change', (e) => { if(e.target.value === 'NEW') { nomeLocalInput.style.display = 'block'; } else { nomeLocalInput.style.display = 'none'; } });
        btnCamera.addEventListener('click', () => { cameraInput.click(); });
        document.getElementById('btnCancelar').addEventListener('click', () => { modalForm.style.display = 'none'; cameraInput.value = ''; imagemPreview.style.display = 'none'; });

        cameraInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectLocal.value = 'NEW'; nomeLocalInput.style.display = 'block'; nomeLocalInput.value = '';
                modalForm.style.display = 'flex'; const arquivo = e.target.files[0]; const leitor = new FileReader();
                leitor.onload = function(evento) {
                    imagemPreview.src = evento.target.result; imagemPreview.style.display = 'block'; nomeProduto.value = '';
                    if (modeloIA) {
                        iaStatus.style.display = 'block'; iaStatus.innerText = '🤖 IA...';
                        imagemPreview.onload = () => {
                            modeloIA.classify(imagemPreview).then(previsoes => {
                                iaStatus.style.display = 'none'; const termoIngles = previsoes[0].className.split(',')[0].toLowerCase().trim();
                                if(idiomaAtual === 'en') { nomeProduto.value = termoIngles.charAt(0).toUpperCase() + termoIngles.slice(1); } 
                                else { const termoTraduzido = dicionarioIA[termoIngles]; if (termoTraduzido) { nomeProduto.value = termoTraduzido; } else { nomeProduto.value = termoIngles.charAt(0).toUpperCase() + termoIngles.slice(1); } }
                            });
                        }
                    }
                }
                leitor.readAsDataURL(arquivo);
            }
        });

        document.getElementById('btnSalvar').addEventListener('click', async () => {
            const t = dicionarioIdiomas[idiomaAtual];
            const valorSelect = selectLocal.value; const localFinal = (valorSelect === 'NEW') ? nomeLocalInput.value.trim() : valorSelect;
            const nome = nomeProduto.value.trim(); const preco = document.getElementById('precoProduto').value; const categoria = document.getElementById('categoriaProduto').value;
            if(!localFinal || !nome || !preco) { alert(t.alertaFalta); return; }

            if (dadosAgrupados[localFinal]) {
                const jaExiste = dadosAgrupados[localFinal].itens.some(item => item.nome.toLowerCase() === nome.toLowerCase());
                if (jaExiste) { alert(t.alertaDuplicado); return; }
            }

            let centro = mapa.getCenter();
            try {
                await addDoc(collection(db, "precos"), { local: localFinal, nome: nome, preco: parseFloat(preco), categoria: categoria, lat: centro.lat, lng: centro.lng, status: "pendente", data: new Date() });
                saldoUsuario += 2.00; document.getElementById('saldoDisplay').innerText = `R$ ${saldoUsuario.toFixed(2).replace('.', ',')}`;
                nomeProduto.value = ''; document.getElementById('precoProduto').value = ''; imagemPreview.style.display = 'none'; modalForm.style.display = 'none'; cameraInput.value = '';
                alert(t.alertaSalvo);
            } catch (error) {}
        });

        function atualizarDropdownLocais() {
            const t = dicionarioIdiomas[idiomaAtual]; let html = `<option value="NEW" id="t_optNewPlace">${t.optNewPlace}</option>`;
            const nomesLocais = Object.keys(dadosAgrupados).sort();
            nomesLocais.forEach(nome => { if(nome !== "Local Desconhecido") html += `<option value="${nome}">${nome}</option>`; });
            selectLocal.innerHTML = html;
        }

        onSnapshot(collection(db, "precos"), (snapshot) => {
            dadosAgrupados = {}; 
            snapshot.forEach((doc) => {
                const item = doc.data(); const id = doc.id; const nomeDoLugar = item.local || "Local Desconhecido"; 
                if (!dadosAgrupados[nomeDoLugar]) { dadosAgrupados[nomeDoLugar] = { lat: item.lat, lng: item.lng, itens: [] }; }
                dadosAgrupados[nomeDoLugar].itens.push({ ...item, id: id });
            });
            atualizarDropdownLocais(); renderizarPinosAgrupados();
        });

        function renderizarPinosAgrupados() {
            camadaDePinos.clearLayers(); marcadoresFisicosNoMapa = {}; const t = dicionarioIdiomas[idiomaAtual];
            for (const nomeEstabelecimento in dadosAgrupados) {
                const dadosLugar = dadosAgrupados[nomeEstabelecimento];
                let temAbusivo = false; let temPendente = false; let htmlListaDeItens = '';

                dadosLugar.itens.forEach(item => {
                    if (item.status === "abusivo") temAbusivo = true; if (item.status === "pendente") temPendente = true;
                    let iconeItem = item.status === 'aprovado' ? '✅' : (item.status === 'abusivo' ? '🚨' : '⏳');
                    let botoes = '';
                    
                    // Os botões de voto só existem no HTML se a pessoa NÃO for turista. 
                    // Mas para garantir, o CSS também esconde eles de forma absoluta.
                    if (item.status === 'pendente') {
                        botoes = `<div class="item-acoes"><button class="btn-voto" style="background:#2e7d32;" onclick="window.votar('${item.id}', 'aprovado')">${t.btnYes}</button><button class="btn-voto" style="background:#c62828;" onclick="window.votar('${item.id}', 'abusivo')">${t.btnNo}</button></div>`;
                    }
                    htmlListaDeItens += `<div class="item-card"><div class="item-row"><span class="item-nome">${iconeItem} ${item.nome}</span><span class="item-preco">R$ ${item.preco.toFixed(2).replace('.', ',')}</span></div>${botoes}</div>`;
                });

                let iconePino = iconeAmarelo; let statusGeral = `<p style="color: #f57c00; font-weight: 700; font-size: 13px; margin:0 0 10px 0;">${t.statusYellow}</p>`;
                if (temAbusivo) { iconePino = iconeVermelho; statusGeral = `<p style="color: #c62828; font-weight: 700; font-size: 13px; margin:0 0 10px 0;">${t.statusRed}</p>`; } 
                else if (!temPendente && dadosLugar.itens.length > 0) { iconePino = iconeVerde; statusGeral = `<p style="color: #2e7d32; font-weight: 700; font-size: 13px; margin:0 0 10px 0;">${t.statusGreen}</p>`; }

                let htmlFinal = `<div class="popup-info"><h3>🏪 ${nomeEstabelecimento}</h3>${statusGeral}<div class="lista-itens">${htmlListaDeItens}</div></div>`;
                let novoPino = L.marker([dadosLugar.lat, dadosLugar.lng], {icon: iconePino});
                novoPino.bindPopup(htmlFinal); camadaDePinos.addLayer(novoPino);
                marcadoresFisicosNoMapa[nomeEstabelecimento] = novoPino;
            }
        }

        window.votar = async function(idDocumento, novoStatus) {
            const docRef = doc(db, "precos", idDocumento);
            try { await updateDoc(docRef, { status: novoStatus }); } catch (error) {}
        };
    </script>
</body>
</html>
